name: lint

on:
  pull_request:
  push:
    branches: [main]

jobs:
  backend:
    name: backend (spotless + checkstyle)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - name: Grant gradlew permission
        run: chmod +x ./gradlew
      - name: Spotless + Checkstyle
        run: ./gradlew spotlessCheck checkstyleMain --no-daemon

  frontend:
    name: frontend (eslint + prettier + tsc)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: client/package-lock.json
      - name: Install deps
        run: npm ci
      - name: ESLint
        run: npm run lint
      - name: Prettier check
        run: npm run format:check
      - name: Type check
        run: npm run typecheck
